<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonny Mena Cancio — Psicólogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f0ece0;
    --dark: #2e2e2a;
    --gold: #b8a040;
    --slate: #4a4a42;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    padding: 2rem;
  }

  .card-wrapper {
    width: 400px;
    max-width: 100%;
  }

  .card {
    width: 100%;
    box-shadow:
      0 2px 4px rgba(46,46,42,0.06),
      0 12px 40px rgba(46,46,42,0.14),
      0 40px 80px rgba(46,46,42,0.08);
    overflow: hidden;
    animation: cardReveal 1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .card-header {
    background: var(--cream);
    padding: 2.8rem 2.5rem 2.4rem;
    text-align: center;
  }

  .card-header::after {
    content: '';
    display: block;
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.8rem auto 0;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.85rem;
    letter-spacing: 0.14em;
    color: var(--dark);
    text-transform: uppercase;
    line-height: 1.15;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
  }

  .registro {
    margin-top: 0.55rem;
    font-size: 0.6rem;
    letter-spacing: 0.26em;
    color: var(--slate);
    text-transform: uppercase;
    font-weight: 300;
    animation: fadeUp 0.8s 0.35s cubic-bezier(0.16,1,0.3,1) both;
  }

  /* ── CONTACT SECTION ── */
  .contact-section {
    background: var(--dark);
    padding: 2rem 2.5rem 2.4rem;
  }

  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .contact-link {
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    padding: 0.75rem 1rem;
    border: 1px solid rgba(184,160,64,0.15);
    transition: border-color 0.3s, background 0.3s, transform 0.2s;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    position: relative;
    overflow: hidden;
  }

  .contact-link:nth-child(1) { animation-delay: 0.5s; }
  .contact-link:nth-child(2) { animation-delay: 0.62s; }
  .contact-link:nth-child(3) { animation-delay: 0.74s; }

  .contact-link::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(184,160,64,0.07), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .contact-link:hover {
    border-color: rgba(184,160,64,0.45);
    transform: translateX(3px);
  }

  .contact-link:hover::after { opacity: 1; }

  .icon-wrap {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg { width: 18px; height: 18px; }

  .link-text { flex: 1; }

  .link-label {
    display: block;
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 0.18rem;
  }

  .link-value {
    display: block;
    font-size: 0.8rem;
    color: rgba(240,236,224,0.82);
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .link-arrow {
    color: var(--gold);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s, transform 0.2s;
    font-size: 1rem;
    line-height: 1;
  }

  .contact-link:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
  }
</style>
</head>
<body>
